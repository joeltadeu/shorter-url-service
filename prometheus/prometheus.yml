global:
  scrape_interval:     15s
  evaluation_interval: 5s
  scrape_timeout:      10s
  external_labels:
    monitor: 'shorterurl-monitor'

scrape_configs:

  - job_name: 'shorterurl'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['shorterurl:8081']

  - job_name: 'cadvisor'
    metrics_path: '/actuator/metrics'
    scrape_interval: 5s
    static_configs:
      - targets: ['cadvisor:8080']